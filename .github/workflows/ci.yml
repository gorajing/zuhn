name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify public surface contracts
        run: npm run verify-contracts

      - name: Verify hook templates are executable
        run: |
          for f in .claude.example/hooks/*.sh templates/hooks/*.sh; do
            [ -f "$f" ] || continue
            [ -x "$f" ] || { echo "FAIL: $f is not executable (run: chmod +x $f)"; exit 1; }
          done
          echo "All hook templates executable"
